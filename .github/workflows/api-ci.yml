name: CI - API

on:
  push:
    branches: [develop, staging, main]
    paths:
      - 'packages/api/**'
  pull_request:
    paths:
      - 'packages/api/**'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @credia/api lint

      - name: Typecheck
        run: pnpm --filter @credia/api typecheck

      - name: Build
        run: pnpm --filter @credia/api build