name: CI - API

on:
  push:
    branches: [develop, staging, main]
    paths:
      - 'packages/api/**'
  pull_request:
    paths:
      - 'packages/api/**'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint -w @credia/api || true

      - name: Typecheck
        run: npx tsc --noEmit -p packages/api/tsconfig.json || true

      - name: Build
        run: npm run build -w @credia/api